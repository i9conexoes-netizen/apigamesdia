<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove | Central de Transmissões</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0b0e11;
            --card-bg: #1a1f24;
            --text: #ffffff;
            --accent: #ff3e3e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .container { max-width: 850px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(180deg, #161b22 0%, var(--bg) 100%);
            border-radius: 15px;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .header h1 { margin: 0; color: var(--primary); font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }

        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 100px 1fr 140px;
            align-items: center;
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .match-card:hover { border-color: var(--primary); transform: scale(1.01); }

        .status-box { text-align: center; font-size: 12px; color: #8b949e; }
        .time { display: block; font-size: 18px; font-weight: bold; color: var(--text); }
        .live { color: var(--accent); font-weight: bold; animation: pulse 1s infinite; }

        .teams-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
        }

        .team { flex: 1; text-align: center; font-size: 14px; font-weight: 500; }
        .team img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }

        .vs { color: var(--primary); font-weight: 900; font-size: 14px; min-width: 60px; text-align: center; }

        .channel-box {
            text-align: right;
            border-left: 1px solid #30363d;
            padding-left: 10px;
        }

        .channel-name { color: var(--primary); font-weight: bold; font-size: 13px; display: block; }

        @keyframes pulse { 50% { opacity: 0.5; } }

        @media (max-width: 600px) {
            .match-card { grid-template-columns: 1fr; gap: 15px; text-align: center; }
            .channel-box { border-left: none; border-top: 1px solid #30363d; padding: 10px 0 0; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" onclick="location.reload()" style="cursor:pointer">
        <h1><i class="fa-solid fa-bolt"></i> INOVE - JOGOS AO VIVO</h1>
        <div id="data-atual" style="margin-top:5px; font-size:14px; color:#8b949e"></div>
    </div>

    <div id="grid-jogos">
        <div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin"></i> Conectando ao Satélite...</div>
    </div>
</div>

<script>
    // Usando um proxy de backup para evitar o erro de "NADA MOSTRANDO"
    const proxyUrl = "https://api.allorigins.win/get?url=";
    const apiBrasil = "https://site.api.espn.com/apis/site/v2/sports/soccer/bra.1/scoreboard";
    const apiGeral = "https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard";

    async function carregarJogos() {
        try {
            let todosEventos = [];
            
            // Tenta pegar os dados das duas fontes
            const urls = [apiBrasil, apiGeral];
            
            for(let base of urls) {
                const response = await fetch(proxyUrl + encodeURIComponent(base + "?t=" + Date.now()));
                const json = await response.json();
                const data = JSON.parse(json.contents);
                if (data.events) todosEventos = [...todosEventos, ...data.events];
            }

            // Remove duplicados e ordena
            const eventosUnicos = Array.from(new Set(todosEventos.map(e => e.id)))
                .map(id => todosEventos.find(e => e.id === id));
            eventosUnicos.sort((a, b) => new Date(a.date) - new Date(b.date));

            desenharJogos(eventosUnicos);
        } catch (error) {
            document.getElementById('grid-jogos').innerHTML = "<p style='text-align:center'>Erro ao carregar. Clique no título para tentar novamente.</p>";
        }
    }

    function definirCanal(evento) {
        const canalOficial = evento.competitions[0].broadcasts?.[0]?.names?.[0];
        if (canalOficial) return canalOficial;

        const liga = (evento.competitions[0].type.name || "").toLowerCase();
        const desc = (evento.competitions[0].description || "").toLowerCase();

        if (desc.includes("premier")) return "ESPN / Star+";
        if (desc.includes("bra") || desc.includes("brasileiro")) return "Premiere / Globo";
        if (desc.includes("champions")) return "TNT / Max";
        if (desc.includes("laliga")) return "ESPN";
        if (desc.includes("bundesliga")) return "CazéTV / OneFootball";
        
        return "Verificar no App";
    }

    function desenharJogos(eventos) {
        const container = document.getElementById('grid-jogos');
        container.innerHTML = '';

        if (!eventos || eventos.length === 0) {
            container.innerHTML = '<p style="text-align:center">Nenhum jogo importante encontrado para hoje.</p>';
            return;
        }

        eventos.forEach(evento => {
            const status = evento.status.type.shortDetail;
            const isLive = evento.status.type.state === 'in';
            const dataJogo = new Date(evento.date);
            const hora = dataJogo.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const timeCasa = evento.competitions[0].competitors[0];
            const timeFora = evento.competitions[0].competitors[1];

            const html = `
                <div class="match-card">
                    <div class="status-box">
                        <span class="time">${hora}</span>
                        <span class="${isLive ? 'live' : ''}">${isLive ? '● AO VIVO' : status}</span>
                    </div>

                    <div class="teams-box">
                        <div class="team">
                            <img src="${timeCasa.team.logo || ''}" onerror="this.style.display='none'">
                            <div>${timeCasa.team.shortDisplayName}</div>
                        </div>
                        <div class="vs">${isLive ? timeCasa.score + ' - ' + timeFora.score : 'VS'}</div>
                        <div class="team">
                            <img src="${timeFora.team.logo || ''}" onerror="this.style.display='none'">
                            <div>${timeFora.team.shortDisplayName}</div>
                        </div>
                    </div>

                    <div class="channel-box">
                        <span style="font-size:10px; color:#8b949e">TRANSMISSÃO</span>
                        <span class="channel-name">${definirCanal(evento)}</span>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    carregarJogos();
    setInterval(carregarJogos, 60000);
</script>
</body>
</html>
