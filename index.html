<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sports Editor Mobile</title>
    <style>
        /* Reset básico para mobile */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            text-align: center; 
        }

        .header { margin-bottom: 30px; }
        
        .logo-main { 
            width: 80px; 
            height: auto; 
            margin-bottom: 10px; 
            filter: drop-shadow(0 0 10px rgba(0,123,255,0.5));
        }

        h2 { margin: 10px 0; font-weight: 700; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; }

        /* Botão de Upload Estilizado */
        .upload-wrapper {
            background: #161616;
            padding: 30px 20px;
            border-radius: 20px;
            border: 2px dashed #333;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .label-btn { 
            background: #007bff; 
            color: white; 
            padding: 16px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            display: block; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        input[type="file"] { display: none; }

        #status { 
            margin: 15px 0; 
            font-size: 0.9rem; 
            color: #00d4ff; 
            font-weight: 500; 
        }

        /* Container de Resultados */
        .result-item {
            background: #161616;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        img.output-img { 
            width: 100%; 
            height: auto; 
            border-radius: 10px; 
            display: block;
        }

        .save-btn { 
            background: #25d366; 
            color: white; 
            padding: 12px 0; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            display: block; 
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* Instrução para iPhone */
        .hint {
            font-size: 0.75rem;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/lhhqACi.png" class="logo-main" alt="Logo">
        <h2>Sports Editor</h2>
        <p>A logo é aplicada automaticamente.</p>
    </div>

    <div class="upload-wrapper">
        <label for="imageInput" class="label-btn">SELECIONAR CARTAZES</label>
        <input type="file" id="imageInput" accept="image/*" multiple>
        <div id="status">Nenhum arquivo selecionado</div>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const resultContainer = document.getElementById('resultContainer');
    const status = document.getElementById('status');
    
    // Configuração da sua logo
    const userLogo = new Image();
    userLogo.crossOrigin = "anonymous"; 
    userLogo.src = "https://i.imgur.com/lhhqACi.png";

    imageInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        resultContainer.innerHTML = "";
        status.innerText = `Processando ${files.length} imagem(ns)...`;

        for (let file of files) {
            await processAndDisplay(file);
        }

        status.innerText = "✅ Tudo pronto!";
    });

    function processAndDisplay(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Mantém a resolução original da foto
                    canvas.width = img.width;
                    canvas.height = img.height;

                    // 1. Desenha o fundo original
                    ctx.drawImage(img, 0, 0);

                    // 2. Limpa a área inferior esquerda
                    const areaW = img.width * 0.45;
                    const areaH = img.height * 0.35;
                    const areaY = img.height * 0.65;
                    ctx.fillStyle = "#0c1a2e"; 
                    ctx.fillRect(0, areaY, areaW, areaH);

                    // 3. Desenha a sua logo
                    const logoWidth = img.width * 0.32; 
                    const scale = logoWidth / userLogo.width;
                    const logoHeight = userLogo.height * scale;
                    const posX = (areaW - logoWidth) / 2;
                    const posY = img.height - logoHeight - 180;
                    ctx.drawImage(userLogo, posX, posY, logoWidth, logoHeight);

                    // 4. Cria o elemento visual para o iPhone
                    const dataUrl = canvas.toDataURL("image/png");
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "result-item";
                    
                    const finalImg = document.createElement('img');
                    finalImg.className = "output-img";
                    finalImg.src = dataUrl;
                    
                    const btn = document.createElement('a');
                    btn.className = "save-btn";
                    btn.innerText = "BAIXAR IMAGEM";
                    btn.href = dataUrl;
                    btn.download = `editado_${Math.floor(Math.random()*10000)}.png`;

                    const hint = document.createElement('div');
                    hint.className = "hint";
                    hint.innerText = "Dica: No iPhone, você também pode segurar o dedo na imagem para salvar.";

                    itemDiv.appendChild(finalImg);
                    itemDiv.appendChild(btn);
                    itemDiv.appendChild(hint);
                    
                    resultContainer.appendChild(itemDiv);
                    resolve();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
